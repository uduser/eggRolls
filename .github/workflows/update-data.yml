name: Update Stock Data

# 每個交易日台股收盤後自動執行
# UTC 06:35 = 台灣時間 14:35（收盤後 5 分鐘）
on:
  schedule:
    - cron: '35 6 * * 1-5'   # 週一到週五
  workflow_dispatch:
    inputs:
      mode:
        description: 'portfolio-only = 只跑手上標的，full = 完整掃描'
        required: false
        default: 'full'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync config from Vercel KV
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          CONFIG_KV_KEY: ${{ secrets.CONFIG_KV_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          url = os.getenv("KV_REST_API_URL", "").rstrip("/")
          token = os.getenv("KV_REST_API_TOKEN", "")
          key = os.getenv("CONFIG_KV_KEY", "").strip() or "eggrolls:config:current"
          target = Path("backend/config.json")

          if not url or not token:
              print("⚠ KV secret missing, keep repository config.json")
              raise SystemExit(0)

          # 使用 pipeline POST（跟 frontend/api/config.js 一致），避免 URL encoding 問題
          req = urllib.request.Request(
              f"{url}/pipeline",
              data=json.dumps([["GET", key]]).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  pipeline_resp = json.loads(resp.read().decode("utf-8"))
          except Exception as exc:
              print(f"⚠ Failed to fetch KV config: {exc}")
              raise SystemExit(0)

          result = pipeline_resp[0].get("result") if isinstance(pipeline_resp, list) and pipeline_resp else None
          if result is None:
              print("⚠ KV config key not found, keep repository config.json")
              raise SystemExit(0)

          if isinstance(result, str):
              try:
                  result = json.loads(result)
              except Exception:
                  print("⚠ KV config value is not valid JSON string, keep repository config.json")
                  raise SystemExit(0)

          if not isinstance(result, dict):
              print("⚠ KV config value is not object, keep repository config.json")
              raise SystemExit(0)

          target.write_text(json.dumps(result, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"✅ Synced config from KV to {target}")
          PY

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run screener
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.mode }}" = "portfolio-only" ]; then
            ARGS="--portfolio-only"
          fi
          python backend/screener.py $ARGS

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/config.json frontend/public/data/stocks.json frontend/public/data/portfolio.json frontend/public/data/config.json frontend/public/logos/
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "data: update $(date +%Y-%m-%d) stock data [skip ci]"
          git push
