name: Update Stock Data

# 每個交易日台股收盤後自動執行
# UTC 06:35 = 台灣時間 14:35（收盤後 5 分鐘）
on:
  schedule:
    - cron: '35 6 * * 1-5'   # 週一到週五
  workflow_dispatch:           # 也可以手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run screener
        run: python backend/screener.py

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/stocks.json frontend/public/data/portfolio.json frontend/public/data/config.json frontend/public/logos/
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "data: update $(date +%Y-%m-%d) stock data [skip ci]"
          git push
